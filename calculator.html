<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Calc Precision Unit</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @theme {
            --font-sans: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #050510;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .atmospheric-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .glow-1 {
            position: absolute;
            top: -10%; left: -10%;
            width: 60%; height: 60%;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            from { opacity: 0.4; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.1); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .calc-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .calc-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.05);
        }

        .op-btn {
            background: rgba(249, 115, 22, 0.7);
            border-color: rgba(249, 115, 22, 0.3);
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        .op-btn:hover {
            background: rgba(249, 115, 22, 0.9);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
        }

        .action-btn {
            background: rgba(79, 70, 229, 0.8);
            border-color: rgba(79, 70, 229, 0.3);
        }

        .action-btn:hover {
            background: rgba(79, 70, 229, 1);
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .history-pane {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }

        .history-pane.hidden {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="font-sans">
    <div class="atmospheric-bg">
        <div class="glow-1"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-orange-950/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-md h-[800px] glass-card rounded-[48px] overflow-hidden flex flex-col relative z-10 transition-all">
        <!-- Header -->
        <div class="p-8 pb-4 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center border border-indigo-500/30">
                    <i data-lucide="zap" class="w-6 h-6 text-indigo-400"></i>
                </div>
                <div>
                    <h1 class="text-xs font-black uppercase tracking-[0.2em] text-indigo-300">NEO-CALC</h1>
                    <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">PRECISION UNIT 1.0</p>
                </div>
            </div>
            <button onclick="toggleHistory()" class="p-3 rounded-xl hover:bg-white/5 transition-all text-zinc-500 hover:text-white" id="history-toggle">
                <i data-lucide="history" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Display Area -->
        <div class="flex-1 flex flex-col justify-end p-8 pb-2 gap-2 relative overflow-hidden">
            <div class="text-right h-6 text-indigo-400/60 font-mono text-sm uppercase tracking-widest" id="prev-result">
                Prev: 0
            </div>
            <div class="text-right h-8 text-zinc-500 font-mono text-xl italic" id="expression">
                
            </div>
            <div class="text-right overflow-hidden">
                <span class="text-7xl font-light tracking-tighter tabular-nums break-all" id="main-display">0</span>
            </div>
        </div>

        <!-- Keypad -->
        <div class="p-8 pt-6 grid grid-cols-4 gap-3 bg-black/20">
            <button onclick="clearCalc()" class="calc-btn h-16 rounded-2xl font-bold text-xl text-zinc-400">C</button>
            <button onclick="backspace()" class="calc-btn h-16 rounded-2xl font-bold text-xl flex items-center justify-center text-zinc-400">
                <i data-lucide="delete" class="w-6 h-6"></i>
            </button>
            <button onclick="setOp('/')" class="calc-btn h-16 rounded-2xl font-bold text-xl flex items-center justify-center text-zinc-400">
                <i data-lucide="divide" class="w-6 h-6"></i>
            </button>
            <button onclick="setOp('*')" class="calc-btn op-btn h-16 rounded-2xl font-bold text-xl flex items-center justify-center">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>

            <button onclick="num('7')" class="calc-btn h-16 rounded-2xl font-bold text-xl">7</button>
            <button onclick="num('8')" class="calc-btn h-16 rounded-2xl font-bold text-xl">8</button>
            <button onclick="num('9')" class="calc-btn h-16 rounded-2xl font-bold text-xl">9</button>
            <button onclick="setOp('-')" class="calc-btn op-btn h-16 rounded-2xl font-bold text-xl flex items-center justify-center">
                <i data-lucide="minus" class="w-6 h-6"></i>
            </button>

            <button onclick="num('4')" class="calc-btn h-16 rounded-2xl font-bold text-xl">4</button>
            <button onclick="num('5')" class="calc-btn h-16 rounded-2xl font-bold text-xl">5</button>
            <button onclick="num('6')" class="calc-btn h-16 rounded-2xl font-bold text-xl">6</button>
            <button onclick="setOp('+')" class="calc-btn op-btn h-16 rounded-2xl font-bold text-xl flex items-center justify-center">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>

            <div class="col-span-3 grid grid-cols-3 gap-3">
                <button onclick="num('1')" class="calc-btn h-16 rounded-2xl font-bold text-xl">1</button>
                <button onclick="num('2')" class="calc-btn h-16 rounded-2xl font-bold text-xl">2</button>
                <button onclick="num('3')" class="calc-btn h-16 rounded-2xl font-bold text-xl">3</button>
                <button onclick="num('0')" class="calc-btn h-16 rounded-2xl font-bold text-xl col-span-2">0</button>
                <button onclick="num('.')" class="calc-btn h-16 rounded-2xl font-bold text-xl">.</button>
            </div>
            
            <button onclick="calculate()" class="calc-btn action-btn h-full rounded-2xl font-bold text-xl flex items-center justify-center row-span-1">
                <i data-lucide="equal" class="w-8 h-8"></i>
            </button>
        </div>

        <div class="px-8 py-4 bg-black/40 border-t border-white/5 flex justify-between items-center opacity-40">
            <div class="flex gap-4">
                <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-orange-500"></div>
            </div>
            <p class="text-[9px] font-black tracking-[0.3em] uppercase">NEO-PRECISION DIV</p>
        </div>

        <!-- History Side Pane -->
        <div id="history-pane" class="history-pane hidden absolute inset-0 z-50 bg-zinc-950/90 backdrop-blur-3xl flex flex-col p-8">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold flex items-center gap-3">
                    <i data-lucide="history" class="w-5 h-5 text-indigo-400"></i>
                    Tape History
                </h2>
                <button onclick="clearHistory()" class="text-[10px] font-black text-zinc-500 hover:text-red-400 tracking-widest">CLEAR ALL</button>
            </div>
            
            <div class="flex-1 overflow-y-auto space-y-6 custom-scrollbar pr-2" id="history-list">
                <!-- History Items -->
            </div>

            <button onclick="toggleHistory()" class="mt-8 h-12 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black tracking-[0.2em] hover:bg-white/10 transition-all uppercase">Return to Unit</button>
        </div>
    </div>

    <script>
        let displayValue = '0';
        let prevValue = null;
        let operation = null;
        let isReset = true;
        let history = [];
        let lastRes = 0;

        const mainDisplay = document.getElementById('main-display');
        const expDisplay = document.getElementById('expression');
        const prevLabel = document.getElementById('prev-result');
        const historyList = document.getElementById('history-list');

        function updateUI() {
            mainDisplay.innerText = displayValue;
            expDisplay.innerText = prevValue !== null ? `${prevValue} ${operation || ''}` : '';
            prevLabel.innerText = `Prev: ${lastRes.toLocaleString()}`;
            lucide.createIcons();
        }

        function num(n) {
            if (n === '.') {
                if (displayValue.includes('.')) return;
                if (isReset) {
                    displayValue = '0.';
                    isReset = false;
                    updateUI();
                    return;
                }
            }
            if (isReset) {
                displayValue = n;
                isReset = false;
            } else {
                displayValue = (displayValue === '0' && n !== '.') ? n : displayValue + n;
            }
            updateUI();
        }

        function setOp(op) {
            const current = parseFloat(displayValue);
            if (prevValue !== null && operation) {
                prevValue = perform(prevValue, current, operation);
                displayValue = String(prevValue);
            } else {
                prevValue = current;
            }
            operation = op;
            isReset = true;
            updateUI();
        }

        function perform(a, b, op) {
            switch(op) {
                case '+': return a + b;
                case '-': return a - b;
                case '*': return a * b;
                case '/': return b === 0 ? 0 : a / b;
                default: return b;
            }
        }

        function calculate() {
            if (prevValue === null || !operation) return;
            const current = parseFloat(displayValue);
            const result = perform(prevValue, current, operation);
            
            history.unshift({
                exp: `${prevValue} ${operation} ${current}`,
                res: result,
                time: new Date().toLocaleTimeString()
            });

            lastRes = result;
            displayValue = String(result);
            prevValue = null;
            operation = null;
            isReset = true;
            renderHistory();
            updateUI();
        }

        function clearCalc() {
            displayValue = '0';
            prevValue = null;
            operation = null;
            isReset = true;
            updateUI();
        }

        function backspace() {
            if (displayValue.length > 1) displayValue = displayValue.slice(0, -1);
            else { displayValue = '0'; isReset = true; }
            updateUI();
        }

        function toggleHistory() {
            const p = document.getElementById('history-pane');
            p.classList.toggle('hidden');
        }

        function renderHistory() {
            historyList.innerHTML = history.length === 0 ? 
                '<div class="h-full flex flex-col items-center justify-center opacity-20"><i data-lucide="trash-2" class="w-12 h-12 mb-4"></i><p class="text-xs font-bold uppercase tracking-widest">No Records</p></div>' :
                history.map(h => `
                    <div class="text-right border-r-2 border-indigo-500/20 pr-4 py-2 hover:border-indigo-400 transition-all">
                        <p class="text-zinc-500 text-sm italic">${h.exp} =</p>
                        <p class="text-2xl font-bold text-indigo-300 font-mono">${h.res.toLocaleString()}</p>
                        <p class="text-[9px] text-zinc-600 mt-1 uppercase tracking-widest font-bold">${h.time}</p>
                    </div>
                `).join('');
            lucide.createIcons();
        }

        function clearHistory() { history = []; renderHistory(); }

        // Initial render
        updateUI();
        renderHistory();

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') num(e.key);
            else if (e.key === '.') num('.');
            else if (e.key === '+') setOp('+');
            else if (e.key === '-') setOp('-');
            else if (e.key === '*') setOp('*');
            else if (e.key === '/') setOp('/');
            else if (e.key === 'Enter') calculate();
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Escape') clearCalc();
        });
    </script>
</body>
</html>
