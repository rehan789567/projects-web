<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Quest</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @theme {
            --font-sans: 'Fredoka', sans-serif;
        }

        body {
            background-color: #E0E7FF;
            color: #1e1b4b;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .clay-card {
            background: #f8fafc;
            border-radius: 50px;
            box-shadow: 
                inset -10px -10px 20px rgba(0,0,0,0.05),
                inset 10px 10px 20px rgba(255,255,255,0.8),
                15px 15px 30px rgba(0,0,0,0.05);
        }

        .clay-btn {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 
                inset -5px -5px 10px rgba(0,0,0,0.05),
                inset 5px 5px 10px rgba(255,255,255,0.8),
                8px 8px 16px rgba(0,0,0,0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .clay-btn:hover {
            transform: scale(1.05);
            background: #f1f5f9;
        }

        .clay-btn:active {
            transform: scale(0.95);
            box-shadow: 
                inset 5px 5px 10px rgba(0,0,0,0.05),
                inset -5px -5px 10px rgba(255,255,255,0.8);
        }

        .clay-btn-primary {
            background: #6366f1;
            color: white;
            box-shadow: 
                inset -5px -5px 10px rgba(0,0,0,0.1),
                inset 5px 5px 10px rgba(255,255,255,0.2),
                8px 8px 16px rgba(99, 102, 241, 0.2);
        }

        .clay-btn-primary:hover {
            background: #4f46e5;
        }

        .clay-input-container {
            width: 120px;
            height: 120px;
            border-radius: 40px;
            background: white;
            box-shadow: 
                inset -8px -8px 16px rgba(0,0,0,0.03),
                inset 8px 8px 16px rgba(255,255,255,0.8),
                0 4px 12px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clay-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            color: #312e81;
        }

        .floating-accent {
            position: absolute;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.5;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .feedback-anim {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="font-sans">
    <!-- Background Objects -->
    <div class="floating-accent bg-pink-200 w-64 h-64 rounded-full" style="top: 10%; left: 10%;"></div>
    <div class="floating-accent bg-indigo-200 w-80 h-80 rounded-[80px]" style="bottom: 10%; right: 10%; animation-delay: -3s;"></div>

    <div class="w-full max-w-lg p-6 relative z-10 transition-all duration-500" id="game-container">
        <!-- Core Game Card -->
        <div class="clay-card p-12 flex flex-col items-center">
            <!-- Header -->
            <div class="flex flex-col items-center mb-10">
                <div class="w-16 h-16 bg-indigo-500 rounded-[20px] flex items-center justify-center mb-4 text-white shadow-lg">
                    <i data-lucide="gamepad-2" class="w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-indigo-900">NUMBER QUEST</h1>
                <p class="text-indigo-600/50 font-medium text-xs uppercase tracking-widest mt-1">REHAN INTERACTIVE</p>
            </div>

            <!-- Main Content Area (Dynamic) -->
            <div id="game-view" class="w-full flex flex-col items-center gap-8">
                <!-- Content injected by JS -->
            </div>
        </div>

        <p class="text-center mt-12 text-[10px] font-bold uppercase tracking-[0.4em] opacity-30 text-indigo-950">CLAY-RENDER v4 • REHAN INTERACTIVE</p>
    </div>

    <script>
        let target = 0;
        let guesses = [];
        let message = 'Guess a number (1-100)';
        let lastResult = 'none'; // 'higher' | 'lower' | 'none'
        let currentInput = '';
        let isWon = false;

        const view = document.getElementById('game-view');

        function startNewGame() {
            target = Math.floor(Math.random() * 100) + 1;
            guesses = [];
            message = 'Guess a number (1-100)';
            lastResult = 'none';
            currentInput = '';
            isWon = false;
            console.log("Game started. Target:", target);
            render();
        }

        function handleGuess() {
            const num = parseInt(currentInput);
            if (isNaN(num) || num < 1 || num > 100) {
                message = '1 to 100 only!';
                currentInput = '';
                render();
                return;
            }

            guesses.unshift(num);
            if (num === target) {
                isWon = true;
                message = `Found in ${guesses.length} tries!`;
            } else if (num > target) {
                message = 'TOO HIGH!';
                lastResult = 'higher';
                showFeedbackAnimation();
            } else {
                message = 'TOO LOW!';
                lastResult = 'lower';
                showFeedbackAnimation();
            }
            currentInput = '';
            render();
        }

        function showFeedbackAnimation() {
            setTimeout(() => {
                lastResult = 'none';
                render();
            }, 1500);
        }

        function render() {
            if (isWon) {
                view.innerHTML = `
                    <div class="flex flex-col items-center space-y-8 fade-in">
                        <div class="relative">
                            <div class="absolute -inset-10 bg-yellow-400 blur-3xl opacity-20 rounded-full animate-pulse"></div>
                            <div class="w-32 h-32 rounded-[40px] bg-yellow-400 clay-card flex items-center justify-center text-white relative z-10 shadow-xl">
                                <i data-lucide="trophy" class="w-16 h-16"></i>
                            </div>
                        </div>
                        <div class="text-center">
                            <h2 class="text-4xl font-bold text-indigo-900 mb-2">VICTORY!</h2>
                            <p class="text-indigo-600 font-medium tracking-wide">The number was <span class="text-indigo-950 font-extrabold">${target}</span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-4 w-full">
                            <div class="clay-card bg-indigo-50/50 p-6 text-center">
                                <p class="text-[10px] uppercase font-bold text-indigo-400 tracking-widest mb-1">Guesses</p>
                                <p class="text-2xl font-bold text-indigo-900">${guesses.length}</p>
                            </div>
                            <div class="clay-card bg-indigo-50/50 p-6 text-center">
                                <p class="text-[10px] uppercase font-bold text-indigo-400 tracking-widest mb-1">Accuracy</p>
                                <p class="text-2xl font-bold text-indigo-900">${Math.round((1/guesses.length) * 100)}%</p>
                            </div>
                        </div>
                        <button onclick="startNewGame()" class="clay-btn w-full py-4 text-indigo-600 font-bold flex items-center justify-center gap-3">
                            <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                            PLAY AGAIN
                        </button>
                    </div>
                `;
            } else {
                view.innerHTML = `
                    <div class="flex flex-col items-center w-full space-y-8">
                        <div class="px-6 py-2 rounded-full font-bold text-sm ${message.includes('HIGH') ? 'bg-red-50 text-red-500' : message.includes('LOW') ? 'bg-blue-50 text-blue-500' : 'bg-indigo-50 text-indigo-500'}">
                            ${message}
                        </div>

                        <div class="h-24 flex items-center justify-center">
                            ${lastResult === 'higher' ? '<i data-lucide="chevron-up" class="w-16 h-16 text-red-400 feedback-anim"></i>' : 
                              lastResult === 'lower' ? '<i data-lucide="chevron-down" class="w-16 h-16 text-blue-400 feedback-anim"></i>' : 
                              '<i data-lucide="target" class="w-16 h-16 text-indigo-100 animate-pulse"></i>'}
                        </div>

                        <div class="w-full flex flex-col items-center gap-6">
                            <div class="clay-input-container">
                                <input id="num-input" type="number" class="clay-input" placeholder="00" value="${currentInput}" autofocus oninput="currentInput = this.value">
                            </div>
                            <button onclick="handleGuess()" class="clay-btn clay-btn-primary w-full py-4 uppercase font-bold tracking-widest">
                                SUBMIT GUESS
                            </button>
                        </div>

                        <div class="flex gap-2 flex-wrap justify-center overflow-hidden">
                            ${guesses.slice(0, 5).map(g => `<div class="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center text-indigo-400 font-bold text-sm border border-slate-50">${g}</div>`).join('')}
                            ${guesses.length > 5 ? `<div class="self-center text-indigo-200 font-bold">...</div>` : ''}
                        </div>
                    </div>
                `;
                // Re-focus input after render if not won
                const input = document.getElementById('num-input');
                if (input) {
                    input.focus();
                    input.addEventListener('keydown', (e) => e.key === 'Enter' && handleGuess());
                }
            }
            lucide.createIcons();
        }

        startNewGame();
    </script>
</body>
</html>
